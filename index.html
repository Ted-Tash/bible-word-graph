<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bible Word Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Bible Word Cloud</h1>
    <p class="subtitle">Select a book to visualize its most prominent words</p>
  </header>

  <main>
    <div class="controls">
      <div class="book-select-wrapper">
        <select id="book-select">
          <option value="">Choose a book...</option>
        </select>
      </div>
      <div class="filter-buttons">
        <button id="top5-btn" class="filter-btn">Top 5 Only</button>
        <button id="exclude-deity-btn" class="filter-btn">Exclude God/Jesus/Lord/Christ</button>
      </div>
    </div>

    <div id="range-pickers" class="range-pickers hidden">
      <div class="range-group">
        <label>From</label>
        <select id="start-chapter"></select>
        <span class="range-colon">:</span>
        <select id="start-verse"></select>
      </div>
      <div class="range-group">
        <label>To</label>
        <select id="end-chapter"></select>
        <span class="range-colon">:</span>
        <select id="end-verse"></select>
      </div>
    </div>

    <p id="word-count" class="word-count"></p>
    <div id="cloud-wrapper">
      <p id="cloud-placeholder" class="cloud-placeholder">Select a book above to generate a word cloud</p>
    </div>
    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Loading Bible text...</p>
    </div>
    <div id="error" class="hidden">
      <p id="error-message"></p>
      <button id="retry-btn">Try Again</button>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1.2.7/build/d3.layout.cloud.js"></script>
  <script src="app.js"></script>
</body>
</html>
